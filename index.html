<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>BV Tracker</title>
<style>
  /* ── GLOBAL RESET ── */
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;overflow:hidden;background:#000;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    user-select:none;-webkit-user-select:none;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  }
  /* CRITICAL: force all buttons to inherit color, no browser defaults */
  button{
    color:#fff;background:transparent;border:none;
    font-family:inherit;-webkit-appearance:none;
    -moz-appearance:none;appearance:none;
  }

  /* ── SCREENS ── */
  .screen{
    position:fixed;top:0;left:0;width:100%;height:100%;
    display:none;flex-direction:column;
  }
  .screen.active{display:flex}

  /* ── FLOAT LABEL (ONE style for ALL screens, NO background) ── */
  .float-label{
    position:absolute;top:clamp(20px,12%,40px);left:50%;transform:translateX(-50%);
    font-size:clamp(20px,8vw,30px);font-weight:800;
    color:rgba(255,255,255,0.7);z-index:15;
    pointer-events:none;white-space:nowrap;
    text-shadow:0 2px 8px rgba(0,0,0,0.9);
  }

  /* ── SPLIT SCREENS (Us/Them, P1/P2, Yes/No) ── */
  .split{flex-direction:row!important}
  .split-btn{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    cursor:pointer;color:#fff;
    -webkit-tap-highlight-color:transparent;
    transition:background 0.15s;gap:clamp(3px,1vw,6px);
  }
  .split-btn+.split-btn{border-left:1px solid rgba(0,0,0,0.5)}
  .split-label{
    font-size:clamp(28px,10vw,42px);font-weight:900;
    pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,0.6);
  }
  .split-sub{
    font-size:clamp(12px,3.5vw,16px);font-weight:600;
    pointer-events:none;opacity:0.5;
    text-shadow:0 1px 4px rgba(0,0,0,0.5);
  }

  /* ── GAME SCREEN ── */
  #game-screen{position:relative}
  #game-screen.active{display:flex!important;flex-direction:column!important}

  .game-header{
    font-size:clamp(14px,4.5vw,22px);font-weight:900;
    text-shadow:0 2px 8px rgba(0,0,0,0.8);
  }

  /* ── GAME TOP (header + scoreboard stacked at top center) ── */
  .game-top{
    position:absolute;top:clamp(4px,2%,12px);left:50%;transform:translateX(-50%);
    z-index:12;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;gap:1px;
  }
  .game-footer{
    text-align:center;
    background:rgba(0,0,0,0.55);
    padding:clamp(3px,1.2vw,8px) clamp(10px,5vw,24px);
    border-radius:6px;
    display:flex;flex-direction:column;align-items:center;gap:0;
  }
  .game-footer-serve{
    font-size:clamp(10px,4.5vw,15px);font-weight:700;
    padding:0 5px;border-radius:3px;display:inline-block;line-height:1.3;
  }
  .game-footer-score{
    font-size:clamp(24px,10vw,40px);font-weight:900;color:#fff;
    font-variant-numeric:tabular-nums;line-height:1.1;
  }
  .game-footer-sets{
    font-size:clamp(9px,3.5vw,13px);font-weight:600;
    color:rgba(255,255,255,0.5);line-height:1.2;
  }

  /* ── ZONES (vertical columns on game screen) ── */
  .zones{flex:1;display:flex;flex-direction:row;gap:1px;z-index:2;min-height:0}
  .zone{
    flex:1;cursor:pointer;outline:none;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;color:#fff;
    transition:background 0.15s ease;
  }
  .zone-label{
    font-size:clamp(28px,9vw,52px);font-weight:900;color:#fff;
    text-shadow:0 2px 8px rgba(0,0,0,0.7);
    pointer-events:none;line-height:1;
  }
  .zone-sub{
    font-size:clamp(11px,3vw,16px);font-weight:700;
    color:rgba(255,255,255,0.55);pointer-events:none;margin-top:clamp(2px,0.5vw,4px);
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }

  /* ── GAME BOTTOM (undo + menu, centered) ── */
  .game-bottom{
    position:absolute;bottom:clamp(8px,4%,18px);left:50%;transform:translateX(-50%);
    z-index:12;display:flex;align-items:center;
    justify-content:center;
    gap:clamp(12px,5vw,24px);
    pointer-events:auto;
  }
  .ctrl-btn{
    background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.6);
    font-size:clamp(16px,6vw,22px);
    width:clamp(36px,13vw,48px);height:clamp(36px,13vw,48px);
    border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    pointer-events:auto;flex-shrink:0;
  }

  /* ── SUB-TYPE SCREENS (stacked rows) ── */
  .sub-zones{
    position:absolute;top:0;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;gap:1px;z-index:2;
  }
  .sub-btn{
    flex:1;cursor:pointer;outline:none;
    display:flex;align-items:center;justify-content:center;
    flex-direction:column;color:#fff;
    -webkit-tap-highlight-color:transparent;transition:background 0.15s;
  }
  .sub-label{
    font-size:clamp(18px,5.5vw,26px);font-weight:900;color:#fff;
    pointer-events:none;text-shadow:0 2px 6px rgba(0,0,0,0.6);
  }
  .sub-detail{
    font-size:clamp(9px,2.2vw,12px);font-weight:600;
    color:rgba(255,255,255,0.4);pointer-events:none;margin-top:2px;
  }

  /* ── SERVICE MISS labels ── */
  .sm-label{
    font-size:clamp(22px,7vw,32px);font-weight:900;
    pointer-events:none;text-shadow:0 2px 6px rgba(0,0,0,0.6);
  }
  .sm-sub{
    font-size:clamp(10px,2.5vw,13px);font-weight:600;pointer-events:none;
  }
  .opp-miss-btn{
    width:100%;padding:clamp(18px,8vw,32px) 0;
    background:#2a2000;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    border-top:1px solid rgba(255,180,0,0.15);
    -webkit-tap-highlight-color:transparent;
    transition:background 0.15s;flex-shrink:0;
  }

  /* ── SET/MATCH SCREENS ── */
  .s-center{align-items:center;justify-content:center;gap:12px;background:#000}
  .set-result-label{font-size:clamp(10px,3vw,14px);font-weight:700;color:#555}
  .set-result-score{font-size:clamp(32px,10vw,48px);font-weight:900;color:#fff;font-variant-numeric:tabular-nums}
  .set-result-sets{font-size:clamp(13px,3.5vw,17px);font-weight:700;color:#888;margin-top:2px}
  .set-result-btn{padding:14px 28px;border-radius:8px;font-size:clamp(12px,3.5vw,15px);font-weight:900;cursor:pointer;color:#fff;margin-top:8px}
  .match-winner{font-size:clamp(14px,4vw,20px);font-weight:900}
  .match-sets{font-size:clamp(22px,7vw,32px);font-weight:900;color:#fff;font-variant-numeric:tabular-nums}
  .match-scores{font-size:clamp(11px,3vw,14px);color:#666;margin-top:4px}

  /* ── OVERLAYS ── */
  .overlay{
    position:fixed;top:0;left:0;right:0;bottom:0;background:#000;
    display:none;flex-direction:column;align-items:center;
    justify-content:flex-start;padding:0;
    z-index:50;overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  .overlay.active{display:flex}

  /* Stats top bar — scrolls with content, padded for round safe zone */
  .stats-top-bar{
    width:100%;
    display:flex;gap:2px;
    padding:clamp(4px,1.5vw,8px) clamp(30px,14%,50px);
    flex-shrink:0;
    margin-top:clamp(20px,14%,50px);
  }
  .stats-bar-btn{
    flex:1;padding:clamp(10px,4vw,14px) 0;
    background:#1a1a1a;color:#aaa;border-radius:clamp(6px,2vw,8px);
    font-size:clamp(11px,4.2vw,15px);font-weight:700;
    cursor:pointer;text-align:center;
  }

  /* Stats content area — generous horizontal padding for round screen */
  #stats-content{
    width:100%;
    padding:0 clamp(24px,12%,40px) clamp(60px,25%,100px);
  }

  /* Stats section headers */
  .st-hdr{
    font-size:clamp(11px,4.2vw,14px);font-weight:800;color:#666;
    letter-spacing:0.3px;
    margin:clamp(12px,5vw,18px) 0 clamp(4px,1.5vw,6px);
    text-align:center;
  }
  .st-hdr:first-child{margin-top:clamp(6px,2vw,10px)}

  /* Score block */
  .score-block{
    width:100%;padding:clamp(10px,4vw,16px);margin-bottom:clamp(4px,1.5vw,8px);
    background:#111;border-radius:clamp(6px,2vw,10px);text-align:center;
  }
  .score-block-val{
    font-size:clamp(28px,10vw,40px);font-weight:900;color:#fff;
    font-variant-numeric:tabular-nums;
  }
  .score-block-label{
    font-size:clamp(10px,3.5vw,13px);color:#555;font-weight:700;
  }

  /* Stat rows */
  .st-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:clamp(6px,2.5vw,10px) clamp(10px,4vw,14px);
    background:#111;border-radius:clamp(4px,1.5vw,6px);
    margin-bottom:2px;
  }
  .st-row-label{
    font-size:clamp(11px,4vw,14px);font-weight:600;color:#888;
  }
  .st-row-val{
    font-size:clamp(13px,5vw,18px);font-weight:900;color:#fff;
    font-variant-numeric:tabular-nums;
  }

  /* Player stat blocks */
  .player-stat-block{
    width:100%;padding:clamp(6px,2.2vw,10px) clamp(8px,3vw,12px);
    margin-bottom:clamp(2px,0.8vw,4px);background:#111;
    border-radius:clamp(3px,1vw,5px);
  }
  .player-stat-row{display:flex;justify-content:space-between;align-items:center}
  .player-stat-name{font-size:clamp(10px,3.8vw,13px);font-weight:900}
  .player-stat-eff{
    font-size:clamp(15px,5.5vw,20px);font-weight:900;color:#fff;
    font-variant-numeric:tabular-nums;
  }
  .player-stat-counts{
    font-size:clamp(10px,3.8vw,13px);font-weight:700;margin-top:1px;
    font-variant-numeric:tabular-nums;
  }
  .p-header{
    font-size:clamp(11px,4vw,14px);font-weight:700;
    margin:clamp(6px,2.5vw,10px) 0 clamp(3px,1vw,5px);
  }
  .tr-detail{font-size:clamp(9px,3.2vw,11px);color:#666;margin-top:2px}

  /* Set history rows */
  .set-history-row{
    width:100%;padding:clamp(5px,2vw,8px) clamp(8px,3vw,12px);
    background:#111;border-radius:clamp(3px,1vw,5px);
    margin-bottom:2px;display:flex;justify-content:space-between;
    font-size:clamp(11px,4vw,14px);font-weight:700;
    font-variant-numeric:tabular-nums;
  }

  .stats-btn-row{display:flex;gap:5px;margin-top:5px;width:100%;padding:0 clamp(24px,12%,40px)}
  .stats-btn{flex:1;padding:clamp(8px,3vw,12px) 4px;background:#222;color:#aaa;border-radius:clamp(4px,1.5vw,6px);font-size:clamp(10px,3.5vw,13px);font-weight:700;cursor:pointer}
  .stats-title{font-size:clamp(11px,4vw,14px);font-weight:700;color:#555;margin-bottom:8px;margin-top:clamp(10px,4vw,16px)}
  .qr-container{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:8px}
  .qr-hint{font-size:clamp(9px,2.5vw,11px);color:#555;text-align:center;max-width:240px;line-height:1.4}
  .sheets-input{width:100%;max-width:300px;padding:clamp(8px,2.5vw,12px);background:#111;border:1px solid #333;border-radius:6px;color:#fff;font-size:clamp(10px,3vw,13px);font-family:inherit;margin-bottom:8px;text-align:center}
  .sheets-input::placeholder{color:#444}
  .sheets-status{font-size:clamp(9px,2.5vw,12px);margin-top:6px;font-weight:600;text-align:center}
  .confirm-text{font-size:clamp(18px,5vw,24px);font-weight:900;color:#fff;margin-top:clamp(16px,5vw,30px)}
  .confirm-sub{font-size:clamp(10px,3vw,13px);color:#666;margin-top:6px}
  .confirm-btns{display:flex;gap:clamp(8px,3vw,14px);margin-top:clamp(12px,4vw,18px)}
  .confirm-btn{padding:clamp(10px,3vw,14px) clamp(16px,5vw,24px);border-radius:clamp(5px,1.5vw,8px);color:#fff;font-size:clamp(12px,3.5vw,15px);font-weight:800;cursor:pointer}
  .name-input{
    flex:1;padding:clamp(6px,2vw,10px);
    background:#1a1a1a;border:1px solid #333;border-radius:clamp(4px,1vw,6px);
    color:#fff;font-size:clamp(12px,4vw,16px);font-weight:800;
    font-family:inherit;text-align:center;
    width:0;min-width:0;
  }
  .name-input::placeholder{color:#444;font-weight:600}
  .name-input:focus{outline:none;border-color:#555}
  .mode-btn{
    flex:1;padding:clamp(6px,2vw,10px) 0;
    background:#1a1a1a;color:#555;
    border-radius:clamp(4px,1vw,6px);
    font-size:clamp(10px,3.5vw,13px);font-weight:700;
    cursor:pointer;text-align:center;
    transition:background 0.2s,color 0.2s;
  }
  .mode-btn.active{background:rgba(68,138,255,0.2);color:#64B5F6}
</style>
</head>
<body>

<!-- START: Who serves first? -->
<div class="screen split active" id="start-screen" style="position:relative">
  <div class="float-label" id="start-label">Who serves first?</div>
  <button class="split-btn" style="background:#0a1a3a" id="start-left-btn" onclick="startServe(0)">
    <div class="split-label" style="color:#448AFF" id="start-left-text">Us</div>
  </button>
  <button class="split-btn" style="background:#3a1a00" id="start-right-btn" onclick="startServe(1)">
    <div class="split-label" style="color:#FF9100" id="start-right-text">Them</div>
  </button>
</div>

<!-- SCREEN 1: Who received? (full-size zones, scoreboard overlay) -->
<div class="screen" id="recv-screen" style="position:relative;flex-direction:column!important">
  <!-- Phase label at top -->
  <div style="position:absolute;top:clamp(6px,4%,14px);left:50%;transform:translateX(-50%);z-index:15;pointer-events:none">
    <span id="game-mode-title" style="font-size:clamp(16px,6vw,24px);font-weight:800;color:#448AFF">Sideout</span>
  </div>
  <!-- Compact scoreboard overlay — between title and player names -->
  <div style="position:absolute;top:28%;left:50%;transform:translate(-50%,-50%);z-index:12;pointer-events:none;text-align:center">
    <div id="game-score-serve" style="font-size:clamp(14px,5.5vw,22px);font-weight:700;color:#5a9bd5">Opp 1 serving</div>
    <div style="display:flex;align-items:baseline;justify-content:center;gap:2px">
      <span id="score-us" style="font-size:clamp(34px,14vw,52px);font-weight:900;color:#448AFF">0</span>
      <span style="font-size:clamp(22px,8vw,32px);color:rgba(255,255,255,0.2);font-weight:400">:</span>
      <span id="score-them" style="font-size:clamp(34px,14vw,52px);font-weight:900;color:#FF9100">0</span>
    </div>
    <div style="font-size:clamp(9px,3vw,12px);color:rgba(255,255,255,0.25);font-weight:600">
      <span id="score-label-us" style="color:rgba(68,138,255,0.4)">us</span>
      <span id="game-score-sets">S 0-0</span>
      <span id="score-label-them" style="color:rgba(255,145,0,0.4)">them</span>
    </div>
  </div>
  <!-- Full-size tap zones — names pushed lower -->
  <div style="flex:1;display:flex;flex-direction:row;gap:1px;min-height:0;z-index:2">
    <button class="zone" id="recv-left" onclick="pickRecv(0)" style="flex:1;flex-direction:column;justify-content:center;padding-top:clamp(60px,32%,90px)">
      <span style="font-size:clamp(10px,3.5vw,14px);font-weight:600;color:rgba(255,255,255,0.35)">Receiver</span>
      <span class="zone-label" id="recv-left-name" style="font-size:clamp(26px,10vw,40px)">P1</span>
      <span class="zone-sub" id="recv-left-stat" style="font-size:clamp(12px,4.5vw,18px);font-weight:700;color:rgba(255,255,255,0.6)"></span>
    </button>
    <button class="zone" id="recv-right" onclick="pickRecv(1)" style="flex:1;flex-direction:column;justify-content:center;padding-top:clamp(60px,32%,90px)">
      <span style="font-size:clamp(10px,3.5vw,14px);font-weight:600;color:rgba(255,255,255,0.35)">Receiver</span>
      <span class="zone-label" id="recv-right-name" style="font-size:clamp(26px,10vw,40px)">P2</span>
      <span class="zone-sub" id="recv-right-stat" style="font-size:clamp(12px,4.5vw,18px);font-weight:700;color:rgba(255,255,255,0.6)"></span>
    </button>
  </div>
  <!-- Undo/menu positioned under player names -->
  <button class="ctrl-btn" id="g-undo" onclick="event.stopPropagation();undoLast()" style="position:absolute;left:clamp(14px,8%,24px);top:68%;width:clamp(30px,11vw,38px);height:clamp(30px,11vw,38px);font-size:clamp(13px,4.5vw,18px);opacity:0.5;z-index:14">↩</button>
  <button class="ctrl-btn" onclick="event.stopPropagation();showStats()" style="position:absolute;right:clamp(14px,8%,24px);top:68%;width:clamp(30px,11vw,38px);height:clamp(30px,11vw,38px);font-size:clamp(13px,4.5vw,18px);opacity:0.5;z-index:14">☰</button>
  <!-- Serve error fills bottom -->
  <button class="opp-miss-btn" id="svc-err-btn" onclick="svcError()" style="flex-shrink:0;padding:clamp(26px,12vw,44px) 0;width:100%;z-index:2">
    <span style="font-size:clamp(16px,6vw,24px);font-weight:800;color:#FFB300" id="svc-err-text">Serve error</span>
  </button>
</div>

<!-- SCREEN 2: What happened? (3 rows: +1 / 0 / -1) -->
<div class="screen" id="outcome-screen" style="position:relative;flex-direction:column!important">
  <div style="flex:1;display:flex;flex-direction:column;gap:1px;min-height:0;z-index:2">
    <!-- Top: Clean SO (+1) — smaller -->
    <button class="zone" onclick="pickOutcome('clean_so')" style="flex:2;flex-direction:column;justify-content:center;background:rgba(0,40,20,0.5)">
      <span style="font-size:clamp(18px,7vw,28px);font-weight:900;color:#00C853">Clean SO</span>
    </button>
    <!-- Middle: 0 Won / 0 Lost -->
    <div style="flex:3;display:flex;flex-direction:row;gap:1px;min-height:0">
      <button class="zone" onclick="pickOutcome('zero_won')" style="flex:1;flex-direction:column;justify-content:center;background:rgba(60,40,0,0.35)">
        <span style="font-size:clamp(16px,6vw,24px);font-weight:900;color:rgba(255,179,0,0.8)">0 Won</span>
      </button>
      <button class="zone" onclick="pickOutcome('zero_lost')" style="flex:1;flex-direction:column;justify-content:center;background:rgba(60,40,0,0.35)">
        <span style="font-size:clamp(16px,6vw,24px);font-weight:900;color:rgba(255,179,0,0.8)">0 Lost</span>
      </button>
    </div>
    <!-- Bottom: Aced / Blocked / Error (-1) — larger -->
    <div style="flex:3;display:flex;flex-direction:row;gap:1px;min-height:0">
      <button class="zone" onclick="pickOutcome('aced')" style="flex:1;flex-direction:column;justify-content:center;background:rgba(80,20,20,0.4)">
        <span style="font-size:clamp(14px,5.5vw,22px);font-weight:900;color:rgba(255,130,130,0.8)">Aced</span>
      </button>
      <button class="zone" onclick="pickOutcome('blocked')" style="flex:1;flex-direction:column;justify-content:center;background:rgba(80,20,20,0.4)">
        <span style="font-size:clamp(14px,5.5vw,22px);font-weight:900;color:rgba(255,130,130,0.8)">Blocked</span>
      </button>
      <button class="zone" onclick="pickOutcome('error')" style="flex:1;flex-direction:column;justify-content:center;background:rgba(80,20,20,0.4)">
        <span style="font-size:clamp(14px,5.5vw,22px);font-weight:900;color:rgba(255,130,130,0.8)">Error</span>
      </button>
    </div>
  </div>
</div>

<!-- SET COMPLETE -->
<div class="screen s-center" id="set-screen">
  <div class="set-result-label" id="set-result-label"></div>
  <div class="set-result-score" id="set-result-score"></div>
  <div class="set-result-sets" id="set-result-sets"></div>
  <button class="set-result-btn" style="background:#448AFF" id="set-next-btn" onclick="startNextSet()">Next set</button>
</div>

<!-- MATCH OVER -->
<div class="screen s-center" id="match-screen">
  <div class="set-result-label">Match over</div>
  <div class="match-winner" id="match-winner"></div>
  <div class="match-sets" id="match-sets"></div>
  <div class="match-scores" id="match-scores"></div>
  <button class="set-result-btn" style="background:#222;margin-top:12px" onclick="showStats()">Stats</button>
  <button class="set-result-btn" style="background:#333" onclick="resetAll()">New match</button>
</div>

<!-- OVERLAYS -->
<div class="overlay" id="stats-view">
  <div class="stats-top-bar">
    <button class="stats-bar-btn" onclick="hideStats()">← Back</button>
    <button class="stats-bar-btn" style="color:#64B5F6" onclick="showExport()">Export</button>
    <button class="stats-bar-btn" onclick="showSettings()">Config</button>
    <button class="stats-bar-btn" style="color:#FF5252" onclick="showConfirm()">Reset</button>
  </div>
  <div id="stats-content"></div>
</div>
<div class="overlay" id="settings-view">
  <div class="stats-top-bar">
    <button class="stats-bar-btn" onclick="hideSettings()">← Back</button>
  </div>
  <div style="width:100%;padding:0 clamp(24px,12%,40px) clamp(60px,25%,100px)">
    <div class="st-hdr">Game mode</div>
    <div style="display:flex;gap:2px;margin-bottom:6px">
      <button class="mode-btn" id="mode-match" onclick="setMode('match')">Match</button>
      <button class="mode-btn" id="mode-so_drill" onclick="setMode('so_drill')">SO drill</button>
      <button class="mode-btn" id="mode-tr_drill" onclick="setMode('tr_drill')">TR drill</button>
    </div>
    <div class="st-hdr" style="color:#448AFF">Our team</div>
    <div style="display:flex;gap:clamp(4px,1.5vw,8px);margin-bottom:4px">
      <input id="name-p1" class="name-input" style="border-left:3px solid #448AFF" placeholder="P1" maxlength="12" oninput="saveNames()">
      <input id="name-p2" class="name-input" style="border-left:3px solid #64B5F6" placeholder="P2" maxlength="12" oninput="saveNames()">
    </div>
    <div class="st-hdr" style="color:#FF9100">Opponents</div>
    <div style="display:flex;gap:clamp(4px,1.5vw,8px);margin-bottom:4px">
      <input id="name-ta1" class="name-input" style="border-left:3px solid #FF9100" placeholder="Opp 1" maxlength="12" oninput="saveNames()">
      <input id="name-ta2" class="name-input" style="border-left:3px solid #FFB74D" placeholder="Opp 2" maxlength="12" oninput="saveNames()">
    </div>
    <div class="st-hdr">Player sides</div>
    <div class="st-row" style="cursor:pointer" onclick="toggleLayout()">
      <span class="st-row-label">Tap to swap</span>
      <span class="st-row-val" id="layout-val"></span>
    </div>
    <div style="margin-top:clamp(12px,4vw,20px)">
      <div class="st-row" style="cursor:pointer;background:#0a2a15;border-left:3px solid #00C853" onclick="startGame()">
        <span class="st-row-label" style="color:#00C853;font-weight:800">Start game</span>
        <span class="st-row-val" style="color:#00C853">→</span>
      </div>
    </div>
  </div>
</div>
<div class="overlay" id="export-view">
  <div class="stats-top-bar">
    <button class="stats-bar-btn" onclick="hideExport()">← Back</button>
  </div>
  <div style="width:100%;padding:0 clamp(24px,12%,40px) clamp(60px,25%,100px)">
    <div class="st-hdr">Export data</div>
    <div class="st-row" style="cursor:pointer" onclick="showQR()">
      <span class="st-row-label" style="color:#7C8EFF">QR code</span>
      <span class="st-row-val" style="color:#555">→</span>
    </div>
    <div class="st-row" style="cursor:pointer" onclick="downloadCSV()">
      <span class="st-row-label">CSV download</span>
      <span class="st-row-val" style="color:#555">→</span>
    </div>
    <div class="st-row" style="cursor:pointer" onclick="downloadVLCChapters()">
      <span class="st-row-label" style="color:#FF9100">VLC chapters</span>
      <span class="st-row-val" style="color:#555" id="vlc-status"></span>
    </div>
    <div class="st-hdr">Google Sheets</div>

      <span class="st-row-label" style="color:#66BB6A">Setup / send</span>
      <span class="st-row-val" id="sheets-quick-status" style="color:#555">→</span>
    </div>
    <div class="st-hdr" style="color:#444">Status</div>
    <div class="st-row"><span class="st-row-label">Live push</span><span class="st-row-val" id="export-live-status" style="color:#555">off</span></div>
    <div class="st-row"><span class="st-row-label">Video sync</span><span class="st-row-val" id="export-sync-status" style="color:#555">--</span></div>
  </div>
</div>
<div class="overlay" id="qr-view">
  <div class="stats-top-bar">
    <button class="stats-bar-btn" onclick="hideQR()">← Back</button>
  </div>
  <div style="width:100%;padding:0 clamp(24px,12%,40px) clamp(60px,25%,100px);display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;gap:12px">
    <div class="st-hdr" style="text-align:center;width:100%">Scan with phone</div>
    <div id="qr-display"></div>
    <div style="font-size:clamp(9px,3vw,12px);color:#555;text-align:center;max-width:240px;line-height:1.4" id="qr-hint"></div>
  </div>
</div>
<div class="overlay" id="sheets-view">
  <div class="stats-top-bar">
    <button class="stats-bar-btn" onclick="hideSheets()">← Back</button>
  </div>
  <div style="width:100%;padding:0 clamp(24px,12%,40px) clamp(60px,25%,100px)">
    <div class="st-hdr">Google Sheets</div>
    <div id="sheets-content"></div>
  </div>
</div>
<div class="overlay" id="confirm-view" style="justify-content:center;align-items:center">
  <div style="width:100%;max-width:400px;padding:clamp(30px,15%,80px) clamp(12px,8%,40px);display:flex;flex-direction:column;align-items:center">
    <div class="confirm-text">Reset?</div>
    <div class="confirm-sub" id="confirm-sub"></div>
    <div class="confirm-btns">
      <button class="confirm-btn" style="background:#FF1744" onclick="resetAll()">Yes</button>
      <button class="confirm-btn" style="background:#444" onclick="hideConfirm()">No</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════
   CONFIG
   ═══════════════════════════════════ */
// Players: 0=P1, 1=P2 (our team), 2=Opp1, 3=Opp2
var PL=[
  {name:"P1",color:"#448AFF"},
  {name:"P2",color:"#64B5F6"},
  {name:"Opp 1",color:"#FF9100"},
  {name:"Opp 2",color:"#FFB74D"}
];
var gameMode="match";

/* ═══════════════════════════════════
   PLAYER NAME + MODE INIT
   ═══════════════════════════════════ */
(function initNames(){
  var params=new URLSearchParams(location.search);
  var p1=params.get("p1"),p2=params.get("p2"),o1=params.get("o1"),o2=params.get("o2");
  var mode=params.get("mode");
  if(p1)PL[0].name=p1;if(p2)PL[1].name=p2;
  if(o1)PL[2].name=o1;if(o2)PL[3].name=o2;
  if(mode&&["match","so_drill","tr_drill"].indexOf(mode)>=0)gameMode=mode;
  try{
    var s=localStorage.getItem("bv_players");
    if(s){var d=JSON.parse(s);
      if(!p1&&d.p1)PL[0].name=d.p1;if(!p2&&d.p2)PL[1].name=d.p2;
      if(!o1&&d.o1)PL[2].name=d.o1;if(!o2&&d.o2)PL[3].name=d.o2;
      if(!mode&&d.mode)gameMode=d.mode;
    }
  }catch(e){}
})();

var sheetsUrl="https://script.google.com/macros/s/AKfycbzSXy7P7jQcSq7yviCcxZS3hYbwCrrm0LrlDPpQWqjrwwF3Cn6h_c127eSX5aELIgbf/exec";
var layout="p2left";

/* ═══════════════════════════════════
   STATE
   ═══════════════════════════════════ */
var G;
function freshState(){
  return{
    sU:0,sT:0,setNum:1,setsU:0,setsT:0,
    target:21,matchOver:false,
    // Who receives: 0=us, 1=them. Flips on sideout.
    recvSide:0,
    // Server index within each side: [ourServerIdx, theirServerIdx]
    servers:[0,0],
    // Actions: one entry per rally
    actions:[],
    // Per-set archives
    sets:[],
    t0:Date.now(),
    pending:null,
    videoSync:null,
    livePush:false,
    overlay:{sideout:false,momentum:false,ticker:false,players:false,serve:false,autoShow:true}
  };
}
G=freshState();
var fT=null;

/* ═══════════════════════════════════
   HELPERS
   ═══════════════════════════════════ */
function $(id){return document.getElementById(id)||document.createElement("div")}
function vib(ms){try{if(navigator.vibrate)navigator.vibrate(ms)}catch(e){}}

/* ═══════════════════════════════════
   SWIPE-BACK PROTECTION
   Uses History API so swiping back navigates
   within the app instead of leaving the page.
   ═══════════════════════════════════ */
var screenStack=["start-screen"];
var handlingPop=false;

function show(id){
  var s=document.querySelectorAll(".screen");
  for(var i=0;i<s.length;i++)s[i].classList.remove("active");
  $(id).classList.add("active");
  // Push to stack and browser history
  if(!handlingPop){
    screenStack.push(id);
    try{history.pushState({screen:id},"","")}catch(e){}
  }
}

function showOverlay(id){
  $(id).classList.add("active");
  if(!handlingPop){
    screenStack.push("overlay:"+id);
    try{history.pushState({overlay:id},"","")}catch(e){}
  }
}

function hideOverlayById(id){
  $(id).classList.remove("active");
}

window.addEventListener("popstate",function(e){
  handlingPop=true;
  if(screenStack.length>1){
    var prev=screenStack.pop();
    // If it was an overlay, just close it
    if(prev.indexOf("overlay:")===0){
      var ovId=prev.substring(8);
      $(ovId).classList.remove("active");
    }else{
      // Go back to previous screen
      var target=screenStack[screenStack.length-1];
      if(target.indexOf("overlay:")===0) target="game-screen";
      var s=document.querySelectorAll(".screen");
      for(var i=0;i<s.length;i++)s[i].classList.remove("active");
      $(target).classList.add("active");
    }
  }
  // Always keep at least 2 history entries so we never leave
  try{history.pushState({guard:true},"","")}catch(e){}
  handlingPop=false;
});

// Seed initial history entries to prevent leaving on first swipe
try{
  history.replaceState({screen:"start-screen"},"","");
  history.pushState({guard:true},"","");
}catch(e){}

// Also warn on actual page unload during active match
window.addEventListener("beforeunload",function(e){
  if(G&&(G.sU>0||G.sT>0||G.actions.length>0)){
    e.preventDefault();e.returnValue="";
  }
});
function hexDk(h,f){
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return"#"+((1<<24)+(Math.round(r*f)<<16)+(Math.round(g*f)<<8)+Math.round(b*f)).toString(16).slice(1);
}

/* ═══════════════════════════════════
   STATS CALCULATIONS
   ═══════════════════════════════════ */
function ef(v){return typeof v==="number"?(v>=0?"+":"")+Math.round(v)+"%":"--"}

/* ═══════════════════════════════════
   SERVE HELPERS
   ═══════════════════════════════════ */
// Server global player index: side 0=us (P1/P2), side 1=them (Opp1/Opp2)
function serverGI(){
  var side=G.recvSide===0?1:0; // serving side is opposite of receiving
  return side*2+G.servers[side];
}
function serverName(){return PL[serverGI()].name}
// The two receivers for current phase
function recvPair(){return G.recvSide===0?[0,1]:[2,3]}
function servRotate(){
  // Called when receiving team wins (sideout): teams swap roles, server advances
  var oldServ=G.recvSide===0?1:0;
  G.servers[oldServ]=(G.servers[oldServ]===0)?1:0; // advance their rotation
  G.recvSide=oldServ; // they now receive
}

/* ═══════════════════════════════════
   LAYOUT
   ═══════════════════════════════════ */
function getLP(){return layout==="p2left"?1:0}
function getRP(){return layout==="p2left"?0:1}
function toggleLayout(){layout=layout==="p2left"?"p1left":"p2left";updLayoutLabel()}
function updLayoutLabel(){$("layout-val").textContent="< "+PL[getLP()].name+" | "+PL[getRP()].name+" >"}

/* ═══════════════════════════════════
   PLAYER NAMES
   ═══════════════════════════════════ */
function saveNames(){
  var n1=($("name-p1").value||"").trim();
  var n2=($("name-p2").value||"").trim();
  var o1=($("name-ta1").value||"").trim();
  var o2=($("name-ta2").value||"").trim();
  if(n1)PL[0].name=n1;else PL[0].name="P1";
  if(n2)PL[1].name=n2;else PL[1].name="P2";
  if(o1)PL[2].name=o1;else PL[2].name="Opp 1";
  if(o2)PL[3].name=o2;else PL[3].name="Opp 2";
  persistConfig();
}
function persistConfig(){
  try{localStorage.setItem("bv_players",JSON.stringify({
    p1:PL[0].name,p2:PL[1].name,o1:PL[2].name,o2:PL[3].name,mode:gameMode
  }))}catch(e){}
}
function saveMode(){persistConfig()}
function setMode(m){gameMode=m;saveMode();updModeBtns();vib(30)}
function updModeBtns(){
  ["match","so_drill","tr_drill"].forEach(function(m){
    var el=$("mode-"+m);
    if(el){if(m===gameMode)el.classList.add("active");else el.classList.remove("active")}
  });
}
updModeBtns();

/* ═══════════════════════════════════
   START FLOW
   ═══════════════════════════════════ */
function startServe(side){
  // side: 0=us serves first, 1=them serves first
  G=freshState();
  G.recvSide=side===0?1:0;
  G.videoSync=Date.now();
  vib(50);
  show("recv-screen");upd();
}
function startNextSet(){
  G.setNum++;G.sU=0;G.sT=0;
  G.target=(G.setNum===3)?15:21;
  G.actions=[];
  show("start-screen");
}
function resetAll(){
  G=freshState();
  document.querySelectorAll(".overlay").forEach(function(o){o.classList.remove("active")});
  screenStack=["start-screen"];show("start-screen");
}
function startGame(){
  G=freshState();
  document.querySelectorAll(".overlay").forEach(function(o){o.classList.remove("active")});
  vib([50,30,50]);
  if(gameMode==="so_drill"){
    G.recvSide=0; // we always receive
    G.videoSync=Date.now();
    show("recv-screen");upd();
  }else if(gameMode==="tr_drill"){
    G.recvSide=1; // they always receive
    G.videoSync=Date.now();
    show("recv-screen");upd();
  }else{
    screenStack=["start-screen"];show("start-screen");
  }
}

/* ═══════════════════════════════════
   UPDATE GAME UI (Screen 1: receiver select)
   ═══════════════════════════════════ */
function upd(){
  var weRecv=G.recvSide===0;
  var pair=recvPair();
  // Apply layout swap
  var swapped=layout==="p2left";
  var pL=swapped?pair[1]:pair[0];
  var pR=swapped?pair[0]:pair[1];
  $("game-mode-title").textContent=weRecv?"Sideout":"Transition";
  $("game-mode-title").style.color=weRecv?"#448AFF":"#FF9100";
  var sv=$("game-score-serve");
  sv.textContent=serverName()+" serving";
  sv.style.color=PL[serverGI()].color;
  $("score-us").textContent=G.sU;
  $("score-them").textContent=G.sT;
  $("game-score-sets").textContent="S "+G.setsU+"-"+G.setsT;
  $("recv-left").style.background=hexDk(PL[pL].color,0.2);
  $("recv-right").style.background=hexDk(PL[pR].color,0.2);
  $("recv-left-name").textContent=PL[pL].name;
  $("recv-left-name").style.color=PL[pL].color;
  $("recv-right-name").textContent=PL[pR].name;
  $("recv-right-name").style.color=PL[pR].color;
  var sL=playerSO(pL),sR=playerSO(pR);
  $("recv-left-stat").textContent=sL.recv?Math.round(sL.eff)+"%  "+sL.wins+"/"+sL.recv:"";
  $("recv-right-stat").textContent=sR.recv?Math.round(sR.eff)+"%  "+sR.wins+"/"+sR.recv:"";
  $("svc-err-text").textContent=weRecv?"Opp serve error":"Our serve error";
  $("g-undo").style.opacity=G.actions.length?"0.7":"0.2";
}

/* ═══════════════════════════════════
   SCREEN 2/3 SETUP
   ═══════════════════════════════════ */
function showOutcome(){
  show("outcome-screen");
}

/* ═══════════════════════════════════
   GAME FLOW
   ═══════════════════════════════════ */
function pickRecv(idx){
  var pair=recvPair();
  var swapped=layout==="p2left";
  var pL=swapped?pair[1]:pair[0];
  var pR=swapped?pair[0]:pair[1];
  var recvGI=idx===0?pL:pR;
  G.pending={receiver:recvGI,server:serverGI(),recvSide:G.recvSide};
  vib(40);showOutcome();
}
function pickOutcome(code){
  if(!G.pending)return;
  vib(40);var p=G.pending;
  if(code==="aced")commitAction(p.receiver,"ace",null,"aced");
  else if(code==="blocked")commitAction(p.receiver,"minus",null,"blocked");
  else if(code==="error")commitAction(p.receiver,"error",null,"error");
  else if(code==="zero_lost")commitAction(p.receiver,"zero_lost",null,null);
  else if(code==="zero_won")commitAction(p.receiver,"zero_won",null,null);
  else if(code==="clean_so")commitAction(p.receiver,"plus",p.receiver,null);
}
function svcError(){
  var sgi=serverGI();
  var act={receiver:-1,winner:null,server:sgi,outcome:"svc_error",detail:null,recvSide:G.recvSide,servers:[G.servers[0],G.servers[1]],t:Date.now(),e:Date.now()-G.t0};
  G.actions.push(act);vib([40,20,40]);
  awardPoint(G.recvSide===0?"us":"them");
  show("recv-screen");
}
function commitAction(receiver,outcome,winner,detail){
  var act={receiver:receiver,winner:winner,server:G.pending.server,outcome:outcome,detail:detail,recvSide:G.pending.recvSide,servers:[G.servers[0],G.servers[1]],t:Date.now(),e:Date.now()-G.t0};
  G.actions.push(act);G.pending=null;
  var recvTeam=receiver<2?0:1;var usRecv=recvTeam===0;
  if(outcome==="plus")awardPoint(usRecv?"us":"them");
  else if(outcome==="minus")awardPoint(usRecv?"them":"us");
  else if(outcome==="ace")awardPoint(usRecv?"them":"us");
  else if(outcome==="error")awardPoint(usRecv?"them":"us");
  else if(outcome==="zero_won")awardPoint(usRecv?"us":"them");
  else if(outcome==="zero_lost")awardPoint(usRecv?"them":"us");
  show("recv-screen");
}
function awardPoint(to){
  if(to==="us")G.sU++;else G.sT++;
  var isDrill=gameMode==="so_drill"||gameMode==="tr_drill";
  if(!isDrill){
    var recvWon=(G.recvSide===0&&to==="us")||(G.recvSide===1&&to==="them");
    if(recvWon)servRotate();
  }
  if(isDrill||!checkSetEnd())upd();
  livePush(to==="us"?"+1":"-1");
}
function checkSetEnd(){
  var t=G.target;
  var uW=G.sU>=t&&(G.sU-G.sT)>=2;
  var tW=G.sT>=t&&(G.sT-G.sU)>=2;
  if(!uW&&!tW)return false;
  var w=uW?"us":"them";
  G.sets.push({setNum:G.setNum,sU:G.sU,sT:G.sT,winner:w,actions:G.actions.slice()});
  if(w==="us")G.setsU++;else G.setsT++;
  if(G.setsU>=2||G.setsT>=2){G.matchOver=true;showMatchOver()}
  else showSetComplete();
  return true;
}
function undoLast(){
  if(!G.actions.length)return;
  var last=G.actions.pop();
  var recvTeam=last.receiver<2?0:1;var usRecv=recvTeam===0;
  var usScored=false;
  if(last.outcome==="plus"||last.outcome==="zero_won")usScored=usRecv;
  else if(last.outcome==="minus"||last.outcome==="ace"||last.outcome==="error"||last.outcome==="zero_lost")usScored=!usRecv;
  else if(last.outcome==="svc_error")usScored=last.recvSide===0;
  if(usScored&&G.sU>0)G.sU--;
  if(!usScored&&G.sT>0)G.sT--;
  // Restore full serve state
  G.recvSide=last.recvSide;
  if(last.servers){G.servers[0]=last.servers[0];G.servers[1]=last.servers[1]}
  vib(20);show("recv-screen");upd();
  livePush("undo");
}
function showSetComplete(){
  $("set-result-label").textContent="Set "+G.setNum+" complete";
  $("set-result-score").textContent=G.sU+" : "+G.sT;
  $("set-result-sets").textContent="Sets: "+G.setsU+" - "+G.setsT;
  show("set-screen");
}
function showMatchOver(){
  $("match-winner").textContent=G.setsU>G.setsT?"We win":"They win";
  $("match-winner").style.color=G.setsU>G.setsT?"#448AFF":"#FF9100";
  $("match-sets").textContent=G.setsU+" - "+G.setsT;
  var sc=[];G.sets.forEach(function(s){sc.push(s.sU+"-"+s.sT)});
  $("match-scores").textContent="("+sc.join(", ")+")";
  show("match-screen");
}

/* ═══════════════════════════════════
   STATS HELPERS
   ═══════════════════════════════════ */
function allActions(){
  var a=[];G.sets.forEach(function(s){a=a.concat(s.actions)});
  return a.concat(G.actions);
}
function playerSO(gi){
  var acts=allActions(),recv=0,wins=0,losses=0,zeros=0,aced=0,sum=0;
  acts.forEach(function(a){
    if(a.receiver!==gi)return;
    if(a.outcome==="svc_error")return;
    recv++;
    if(a.outcome==="plus"){wins++;sum+=1}
    else if(a.outcome==="minus"||a.outcome==="error"){losses++;sum-=1}
    else if(a.outcome==="ace"){aced++;losses++;sum-=1}
    else if(a.outcome==="zero_won"){zeros++;wins++}
    else if(a.outcome==="zero_lost"){zeros++;losses++}
  });
  return{recv:recv,wins:wins,losses:losses,zeros:zeros,aced:aced,eff:recv?(sum/recv)*100:0};
}
function playerKills(gi){
  // Clean SO count (only outcome where winner is set to receiver)
  var acts=allActions(),k=0;
  acts.forEach(function(a){if(a.winner===gi)k++});
  return k;
}
function playerDetail(gi){
  // Breakdown of -1 outcomes for this receiver
  var acts=allActions(),blocked=0,aced=0,errors=0;
  acts.forEach(function(a){
    if(a.receiver!==gi)return;
    if(a.outcome==="minus"&&a.detail==="blocked")blocked++;
    else if(a.outcome==="ace")aced++;
    else if(a.outcome==="error")errors++;
  });
  return{blocked:blocked,aced:aced,errors:errors};
}
function playerServe(gi){
  var acts=allActions(),aces=0,errs=0,total=0;
  acts.forEach(function(a){
    if(a.server!==gi)return;total++;
    if(a.outcome==="ace")aces++;
    if(a.outcome==="svc_error")errs++;
  });
  return{aces:aces,errs:errs,total:total};
}
function scoringRuns(){
  var bestUs=0,bestThem=0,curUs=0,curThem=0;
  allActions().forEach(function(a){
    var recvTeam=a.receiver>=0?(a.receiver<2?0:1):(a.recvSide===0?0:1);
    var usScored=false;
    if(a.outcome==="plus"||a.outcome==="zero_won")usScored=recvTeam===0;
    else if(a.outcome==="svc_error")usScored=a.recvSide===0;
    else usScored=recvTeam!==0;
    if(usScored){curUs++;curThem=0;if(curUs>bestUs)bestUs=curUs}
    else{curThem++;curUs=0;if(curThem>bestThem)bestThem=curThem}
  });
  return{us:bestUs,them:bestThem};
}
function pointPace(){
  var acts=allActions();
  if(acts.length<2)return{avg:0};
  var gaps=[];
  for(var i=1;i<acts.length;i++)gaps.push(acts[i].t-acts[i-1].t);
  var sum=0;gaps.forEach(function(g){sum+=g});
  return{avg:Math.round(sum/gaps.length/1000)};
}
function getLast8(){
  var acts=allActions(),r=[];
  for(var i=acts.length-1;i>=0&&r.length<8;i--){
    var a=acts[i],recvTeam=a.receiver>=0?(a.receiver<2?0:1):(a.recvSide===0?0:1);
    var us=false;
    if(a.outcome==="plus"||a.outcome==="zero_won")us=recvTeam===0;
    else if(a.outcome==="svc_error")us=a.recvSide===0;
    else us=recvTeam!==0;
    r.unshift(us?1:-1);
  }
  return r;
}

/* ═══════════════════════════════════
   VIDEO SYNC & VLC CHAPTERS
   ═══════════════════════════════════ */
function msToTC(ms){
  if(ms<0)ms=0;
  var h=Math.floor(ms/3600000);ms%=3600000;
  var m=Math.floor(ms/60000);ms%=60000;
  var s=Math.floor(ms/1000);var fr=ms%1000;
  return(h<10?"0":"")+h+":"+(m<10?"0":"")+m+":"+(s<10?"0":"")+s+"."+(fr<100?"0":"")+(fr<10?"0":"")+fr;
}
function buildVLCChapters(){
  var ref=G.videoSync||G.t0;
  var acts=allActions();
  var entries=[];
  acts.forEach(function(a){
    var recv=a.receiver>=0?PL[a.receiver].name:"?";
    var win=a.winner!=null?PL[a.winner].name:"";
    var desc=a.outcome+" recv:"+recv+(win?" win:"+win:"");
    entries.push({t:a.t,desc:desc});
  });
  entries.sort(function(a,b){return a.t-b.t});
  var lines=[];
  entries.forEach(function(e,i){
    var n=i+1;var pad=n<10?"0":"";
    var tc=msToTC(e.t-ref);
    lines.push("CHAPTER"+pad+n+"="+tc);
    lines.push("CHAPTER"+pad+n+"NAME="+e.desc);
  });
  return lines.join("\n");
}
function downloadVLCChapters(){
  var ch=buildVLCChapters();
  if(!ch)return;
  var b=new Blob([ch],{type:"text/plain"});
  var u=URL.createObjectURL(b);
  var l=document.createElement("a");
  l.href=u;l.download="bv_"+new Date().toISOString().slice(0,10)+".chapters.txt";
  l.click();URL.revokeObjectURL(u);
}
function getLastAction(){
  var acts=allActions();
  if(!acts.length)return"";
  var a=acts[acts.length-1];
  var recv=a.receiver>=0?PL[a.receiver].name:"";
  var win=a.winner!=null?PL[a.winner].name:"";
  if(a.outcome==="svc_error")return"svc err "+PL[a.server].name;
  if(a.outcome==="ace")return"ace "+PL[a.server].name;
  return a.outcome+" "+recv+(win?" > "+win:"");
}
function buildLivePayload(action){
  var p1so=playerSO(0),p2so=playerSO(1),o1so=playerSO(2),o2so=playerSO(3);
  var p1sv=playerServe(0),p2sv=playerServe(1);
  var p1d=playerDetail(0),p2d=playerDetail(1);
  var runs=scoringRuns(),pace=pointPace();
  var weRecv=G.recvSide===0;
  var tRecv=p1so.recv+p2so.recv,tWins=p1so.wins+p2so.wins;
  var teamSO=tRecv?Math.round((tWins/tRecv)*100):0;
  return{
    timestamp:new Date().toISOString(),
    scoreUs:G.sU,scoreThem:G.sT,
    setsUs:G.setsU,setsThem:G.setsT,setNum:G.setNum,
    phase:weRecv?"sideout":"transition",
    server:serverName(),
    lastAction:action==="undo"?"undo":getLastAction(),
    soTeam:teamSO,
    p1Name:PL[0].name,p1SO:Math.round(p1so.eff),p1Recv:p1so.recv,p1Wins:p1so.wins,p1Zeros:p1so.zeros,p1Lost:p1so.losses,
    p1Blocked:p1d.blocked,p1Aced:p1d.aced,p1Errors:p1d.errors,
    p1SvAces:p1sv.aces,p1SvcErr:p1sv.errs,
    p2Name:PL[1].name,p2SO:Math.round(p2so.eff),p2Recv:p2so.recv,p2Wins:p2so.wins,p2Zeros:p2so.zeros,p2Lost:p2so.losses,
    p2Blocked:p2d.blocked,p2Aced:p2d.aced,p2Errors:p2d.errors,
    p2SvAces:p2sv.aces,p2SvcErr:p2sv.errs,
    o1Name:PL[2].name,o1SO:Math.round(o1so.eff),o1Recv:o1so.recv,o1Wins:o1so.wins,o1Lost:o1so.losses,
    o2Name:PL[3].name,o2SO:Math.round(o2so.eff),o2Recv:o2so.recv,o2Wins:o2so.wins,o2Lost:o2so.losses,
    bestRunUs:runs.us,bestRunThem:runs.them,pointPace:pace.avg,
    last8:getLast8(),matchOver:G.matchOver,
    overlay:G.overlay
  };
}
function livePush(action){
  if(!G.livePush||!sheetsUrl)return;
  var payload=buildLivePayload(action);
  try{
    fetch(sheetsUrl,{
      method:"POST",mode:"no-cors",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify(payload)
    }).catch(function(){});
  }catch(e){}
}
function toggleOverlay(key){
  G.overlay[key]=!G.overlay[key];
  updStreamToggles();

}
function toggleAutoShow(){

}
function toggleLivePush(){

}
function updStreamToggles(){
  var mods=["sideout","momentum","ticker","players","serve"];

function buildDataStr(){
  var d=new Date().toISOString().slice(0,10),l=["BV "+d,"Sets:"+G.setsU+"-"+G.setsT];
  G.sets.forEach(function(s){l.push("S"+s.setNum+":"+s.sU+"-"+s.sT)});

  }

function buildCSV(){
  var r=[];
  // Raw actions
  r.push("--- RAW ACTIONS ---");
  r.push("Set,Receiver,Winner,Outcome,Server,RecvSide,Timestamp,Elapsed_ms");
  function add(sn,acts){
    acts.forEach(function(a){
      var recv=a.receiver>=0?PL[a.receiver].name:"";
      var win=a.winner!=null?PL[a.winner].name:"";
      var srv=PL[a.server].name;
      r.push(sn+","+recv+","+win+","+a.outcome+","+srv+","+(a.recvSide===0?"us":"them")+","+new Date(a.t).toISOString()+","+a.e);
    });
  }
  G.sets.forEach(function(s){add(s.setNum,s.actions)});
  add(G.setNum,G.actions);
  // Set scores
  r.push("");r.push("--- SET SCORES ---");
  r.push("Set,Us,Them,Winner");
  G.sets.forEach(function(s){r.push(s.setNum+","+s.sU+","+s.sT+","+s.winner)});
  if(!G.matchOver)r.push(G.setNum+","+G.sU+","+G.sT+",live");
  // Player stats
  r.push("");r.push("--- PLAYER STATS ---");
  r.push("Player,Team,SO_Eff,Recv,Wins,Zeros,Losses,Blocked,Aced,Errors,SvAces,SvcErr");
  for(var i=0;i<4;i++){
    var so=playerSO(i),d=playerDetail(i),sv=playerServe(i);
    var team=i<2?"us":"them";
    r.push(PL[i].name+","+team+","+Math.round(so.eff)+","+so.recv+","+so.wins+","+so.zeros+","+so.losses+","+d.blocked+","+d.aced+","+d.errors+","+sv.aces+","+sv.errs);
  }
  return r.join("\n");
}

function qrFail(){$("qr-display").innerHTML='<div style="color:#888;font-size:9px;background:#111;padding:6px;border-radius:4px;white-space:pre-wrap;max-height:120px;overflow-y:auto">'+buildDataStr()+'</div>'}
function hideQR(){hideOverlayById("qr-view");showExport()}
function showSheetsSetup(){hideOverlayById("export-view");var sc=$("sheets-content");if(sheetsUrl){sc.innerHTML='<div class="st-row"><span class="st-row-label">Status</span><span class="st-row-val" style="color:#66BB6A">Connected</span></div><div class="st-row"><span class="st-row-label">Live push</span><span class="st-row-val" style="color:'+(G.livePush?"#00C853":"#555")+'">'+(G.livePush?"on":"off")+'</span></div><div class="st-row" style="cursor:pointer;margin-top:8px" onclick="sendTestPing()"><span class="st-row-label" style="color:#66BB6A">Send test</span><span class="st-row-val" style="color:#555">→</span></div><div class="sheets-status" id="sheets-status" style="margin-top:6px"></div><div class="st-row" style="cursor:pointer;margin-top:8px" onclick="editSheetsUrl()"><span class="st-row-label" style="color:#888">Change URL</span><span class="st-row-val" style="color:#555">→</span></div>'}else{sc.innerHTML='<div class="st-row" style="flex-direction:column;align-items:stretch;gap:8px"><span class="st-row-label">Apps Script URL</span><input class="sheets-input" id="sheets-url-input" type="url" placeholder="https://script.google.com/..." style="margin:0"></div><div class="st-row" style="cursor:pointer;margin-top:4px" onclick="saveSheetsUrl()"><span class="st-row-label" style="color:#66BB6A">Save</span><span class="st-row-val" style="color:#555">→</span></div><div class="sheets-status" id="sheets-status" style="margin-top:6px"></div>'};showOverlay("sheets-view")}
function editSheetsUrl(){sheetsUrl="";G.livePush=false;showSheetsSetup()}
function saveSheetsUrl(){var u=($("sheets-url-input")||{}).value||"";if(!u)return;sheetsUrl=u;var st=$("sheets-status");st.innerHTML='<span style="color:#66BB6A">URL saved! Enable Live Push in stats menu.</span>'}
function sendTestPing(){var st=$("sheets-status");st.innerHTML='<span style="color:#FFB300">Sending...</span>';var payload=buildLivePayload("test");fetch(sheetsUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)}).then(function(){st.innerHTML='<span style="color:#66BB6A">Sent! Check your sheet.</span>';vib(50)}).catch(function(){st.innerHTML='<span style="color:#FF1744">Failed — check URL</span>'})}
function hideSheets(){hideOverlayById("sheets-view");showExport()}
function downloadCSV(){var c=buildCSV(),b=new Blob([c],{type:"text/csv"}),u=URL.createObjectURL(b),l=document.createElement("a");l.href=u;l.download="bv_"+new Date().toISOString().slice(0,10)+".csv";l.click();URL.revokeObjectURL(u)}
function showConfirm(){hideOverlayById("stats-view");$("confirm-sub").textContent="All data will be cleared";showOverlay("confirm-view")}
function hideConfirm(){hideOverlayById("confirm-view");showStats()}

</script>
</body>
